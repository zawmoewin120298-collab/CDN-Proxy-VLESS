# Events block configures the connection processing method
events {
    # Maximum number of simultaneous connections that can be opened by a worker process
    worker_connections 1024;
}

# HTTP context for defining web server behavior
http {

    # Configure DNS resolver for upstream server name resolution
    resolver 8.8.8.8 valid=1200s;

    # Main server block
    server {
        # 💡 ပြင်ဆင်ချက် - Cloud ပေါ်တွင် run ရန် Port 80 အစား 7860 (သို့) high port တစ်ခုခုကို သုံးပါ
        listen 7860;
        # Server name for this virtual host
        server_name localhost;

        # 💡 မှတ်ချက် - Permission Denied Error တက်ပါက လမ်းကြောင်းများကို /tmp/... သို့ ပြောင်းပေးပါ
        error_log /var/log/nginx/error.log debug;
        access_log /var/log/nginx/access.log;

        # =========================================================
        # 🎯 Xray (VLESS/VMess) အတွက် Location
        # =========================================================
        # config.json ထဲက path "/www.speedtest.net" နဲ့ v2rayNG client ထဲက path ကွက်တိ ကိုက်ညီရပါမည်
        location /www.speedtest.net {
            if ($http_upgrade != "websocket") {
                return 404;
            }
            proxy_redirect off;
            
            # Xray Core သည် ဤ Port (8080) တွင် အမှန်တကယ် Run နေရန် လိုအပ်သည်
            proxy_pass http://127.0.0.1:8080;
            
            # WebSocket ချိတ်ဆက်မှုအတွက် Headers များ
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # 💡 ပြင်ဆင်ချက် - Connection မကြာခဏ ပြတ်ကျခြင်းမှ ကာကွယ်ရန် Timeouts များ ပေါင်းထည့်ထားသည်
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Location block for redirecting to Google
        location /redirect-to-google {
            proxy_pass https://www.google.com;
        }

        # Location block for proxying Optimizely CDN datafiles
        location /datafiles/ {
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_pass https://cdn.optimizely.com/datafiles/;

            # CORS Headers
            add_header 'Access-Control-Allow-Methods' 'GET,OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

            proxy_set_header Host cdn.optimizely.com;
        }

        # Document root directory for serving static files
        root /usr/share/nginx/html; 

        # Default files to serve when no specific file is requested
        index index.html index.htm;
    }
}
