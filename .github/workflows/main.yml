name: Deploy Advanced NGINX CDN & VPN Proxy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    steps:
    # ၁။ GitHub Repository ထဲက ကုဒ်တွေကို ဆွဲယူခြင်း
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # ၂။ ဖိုင်တွေ အစုံအလင် ရှိမရှိ အရင်စစ်ဆေးခြင်း
    - name: Verify Configuration Files
      run: |
        echo "Validating project structure..."
        test -f Dockerfile && echo "✓ Dockerfile exists."
        test -f nginx-advanced.conf && echo "✓ Nginx config exists."
        test -f index.html && echo "✓ Web Index page exists."

    # ၃။ Railway ရဲ့ တရားဝင် GitHub Action ကို သုံးပြီး တိုက်ရိုက်အလွယ်တကူ Deploy လုပ်ခြင်း
    - name: Deploy to Railway
      uses: bervProject/railway-deploy-action@v1
      with:
        railway_token: ${{ secrets.RAILWAY_TOKEN }}
