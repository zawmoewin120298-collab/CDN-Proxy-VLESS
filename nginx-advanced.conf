# Advanced NGINX Configuration for CDN Proxy + V2ray/Xray Integrated
# This demonstrates production-ready features including caching, rate limiting, 
# load balancing, security headers, monitoring, and more

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    # BASIC SETTINGS & PERFORMANCE
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    
    types_hash_max_size 2048;
    server_names_hash_bucket_size 64;
    
    server_tokens off;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # LOGGING CONFIGURATION
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status rt:$request_time '
                    'upstream:$upstream_response_time';
    
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    
    # COMPRESSION SETTINGS
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript text/json application/json application/javascript application/xml+rss application/atom+xml application/rdf+xml image/svg+xml;
    gzip_disable "msie6";
    
    # RATE LIMITING ZONES
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=datafiles:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=health:1m rate=1r/s;
    
    connection_limit_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
    
    # CACHE CONFIGURATION
    proxy_cache_path /var/cache/nginx/cdn levels=1:2 keys_zone=cdn_cache:100m max_size=2g inactive=24h use_temp_path=off;
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=1g inactive=7d use_temp_path=off;
    
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    
    # UPSTREAM CONFIGURATION
    upstream optimizely_cdn {
        server cdn.optimizely.com:443 max_fails=3 fail_timeout=30s weight=3;
        keepalive 32;
    }
    
    upstream google_services {
        server www.google.com:443 max_fails=2 fail_timeout=10s;
        keepalive 16;
    }
    
    # SECURITY MAP DEFINITIONS
    map $http_user_agent $blocked_agent {
        default 0;
        ~*malicious 1;
        ~*bot 1;
        ~*crawler 1;
    }
    
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost cdn-proxy.local;
        
        limit_conn conn_limit_per_ip 20;
        
        # SECURITY HEADERS
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        
        error_log /var/log/nginx/error.log warn;
        access_log /var/log/nginx/access.log main;
        
        limit_req zone=general burst=100 nodelay;
        
        # MONITORING & HEALTH ENDPOINTS
        location /health {
            limit_req zone=health burst=5 nodelay;
            access_log off;
            return 200 "healthy\n";
        }
        
        # 🎯 ပြင်ဆင်ချက် (၁) - Path ကို /vless-cdn သို့ ညှိပြီး Port ကို config.json ထဲကအတိုင်း 10086 သို့ ကွက်တိ ပြောင်းလဲခြင်း
        location /vless-cdn {
            limit_req_log_level info;
            
            if ($http_upgrade != "websocket") {
                return 404;
            }
            proxy_redirect off;
            
            # Xray Core Port 10086 သို့ လှမ်းတွန်းပေးခြင်း
            proxy_pass http://127.0.0.1:10086;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SECURITY BLOCKING
        if ($blocked_agent) {
            return 403 "Forbidden";
        }
        
        # 🎯 ပြင်ဆင်ချက် (၂) - အစ်ကို့ရဲ့ Tunnel Host နာမည် 'k.trueth.kdns.fr' နှင့် 'openspeedtestnetc.up.railway.app' ကို ခွင့်ပြုချက်စာရင်းထဲ ထည့်သွင်းခြင်း
        if ($host !~ ^(localhost|cdn-proxy\.local|127\.0\.0\.1|k\.trueth\.kdns\.fr|openspeedtestnetc\.up\.railway\.app)$) {
            return 444;
        }
        
        # ENHANCED GOOGLE PROXY
        location /redirect-to-google {
            proxy_pass https://google_services;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_set_header Host www.google.com;
            add_header X-Cache-Status $upstream_cache_status always;
        }
        
        # STATIC FILE SERVING
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ @fallback_static;
        }
        
        location @fallback_static {
            return 404 '{"error": "File not found"}';
            add_header Content-Type application/json always;
        }
        
        # ERROR PAGES
        error_page 400 /errors/400.html;
        error_page 404 /errors/404.html;
        error_page 500 502 503 504 /errors/50x.html;
        
        location ^~ /errors/ {
            internal;
            root /usr/share/nginx/html;
        }
    }
    
    server {
        listen 80;
        server_name _;
        return 444;
    }
}

