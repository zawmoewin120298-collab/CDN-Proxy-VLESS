events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 2000;
    
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    
    server_tokens off;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    resolver 8.8.8.8 8.8.4.4 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # VPN Infrastructure အတွက် Limit Zone အားလုံးကို လုံခြုံစိတ်ချရအောင် ဖယ်ရှားထားပါသည်

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name localhost cdn-proxy.local;
        
        error_log /var/log/nginx/error.log warn;
        access_log /var/log/nginx/access.log main;
        
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
        
        # 🎯 Xray VLESS WebSocket Proxy Gateway
        location /vless-cdn {
            if ($http_upgrade != "websocket") {
                return 404;
            }
            proxy_redirect off;
            
            # Xray Core Local Port 10086 သို့ ပို့ပေးခြင်း
            proxy_pass http://127.0.0.1:10086;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Security Host Validation (အစ်ကိုကြီး၏ Domains များအားလုံး ပါဝင်ပါသည်)
        if ($host !~ ^(localhost|cdn-proxy\.local|127\.0\.0\.1|k\.trueth\.kdns\.fr|openspeedtestnetc\.up\.railway\.app)$) {
            return 444;
        }
        
        # Static Default Root serving
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ =404;
        }
    }
}

