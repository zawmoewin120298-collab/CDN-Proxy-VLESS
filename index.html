<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM-VPN Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="flex items-center space-x-3 mb-6">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-ping"></div>
            <h1 class="text-xl font-bold tracking-wide">MM-VPN Server Active</h1>
        </div>
        
        <div class="space-y-4 mb-6">
            <div class="bg-gray-950 p-3 rounded-lg border border-gray-800/50">
                <p class="text-xs text-gray-500 uppercase">UUID</p>
                <p class="font-mono text-sm break-all text-green-400">UUID_PLACEHOLDER</p>
            </div>
            <div class="bg-gray-950 p-3 rounded-lg border border-gray-800/50">
                <p class="text-xs text-gray-500 uppercase">WebSocket Path</p>
                <p class="font-mono text-sm text-blue-400">PATH_PLACEHOLDER</p>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-xs text-gray-500 uppercase mb-2">VLESS Config Link</label>
            <textarea id="configLink" readonly class="w-full bg-gray-950 border border-gray-800 rounded-lg p-3 text-xs font-mono resize-none h-24 focus:outline-none focus:border-green-500 text-gray-300">VLESS_LINK_PLACEHOLDER</textarea>
        </div>

        <button onclick="copyConfig()" class="w-full py-3 bg-green-600 hover:bg-green-500 active:bg-green-700 transition duration-200 rounded-xl font-medium shadow-lg shadow-green-900/20">
            Copy Configuration
        </button>
    </div>

    <script>
        function copyConfig() {
            const copyText = document.getElementById("configLink");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("VLESS Link Copied successfully! 🎉");
        }
    </script>
</body>
</html>
