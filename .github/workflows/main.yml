name: Deploy Advanced NGINX CDN & VPN Proxy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    steps:
    # ၁။ GitHub ထဲက ကုဒ်တွေကို ဆွဲယူခြင်း
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # ၂။ ရေးထားတဲ့ ဖိုင်တွေ စုံမစုံ အရင်စစ်ဆေးခြင်း
    - name: Verify Configuration Files
      run: |
        echo "Validating project structure..."
        test -f Dockerfile && echo "✓ Dockerfile exists."
        test -f nginx-advanced.conf && echo "✓ Nginx config exists."
        test -f index.html && echo "✓ Web Index page exists."

    # ၃။ Railway CLI ကို Ubuntu ပေါ်မှာ တရားဝင် နည်းလမ်းအတိုင်း တိုက်ရိုက် Install လုပ်ခြင်း
    - name: Install Railway CLI
      run: npm install -g @railway/cli

    # ၄။ Railway ပေါ်သို့ အမှားအယွင်းမရှိ တိုက်ရိုက် ကုဒ်တွန်းတင် (Deploy) ခြင်း
    - name: Deploy to Production
      run: railway up --detach
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
